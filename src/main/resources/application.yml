spring:
  application:
    name: spring-boot-hello
  config:
    import:
      - "optional:configtree:/app/secrets/"
  threads:
    virtual:
      enabled: true

server:
  shutdown: graceful

management:
  server:
    port: 8081
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
  health:
    livenessState:
      enabled: true
    readinessState:
      enabled: true
  prometheus:
    metrics:
      export:
        enabled: true
  metrics:
    tags:
      application: spring-boot-hello
